<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="5">
<title>CMA Memory Log</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface-2: #1f1f1f;
    --border: #2a2a2a;
    --border-hover: #3a3a3a;
    --text: #e5e5e5;
    --text-dim: #909090;
    --text-faint: #5a5a5a;
    --c-retrieve: #4a9eff;
    --c-search: #888888;
    --c-record: #4ade80;
    --c-index: #c084fc;
    --c-ingest: #14b8a6;
    --c-bootstrap: #f59e0b;
    --c-prompt: #fbbf24;
    --c-stop: #6b7280;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "SF Pro Text", system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px 48px; }
  header { margin-bottom: 24px; }
  h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  .subtitle { color: var(--text-dim); font-size: 13px; margin-top: 4px; }
  .updated { color: var(--text-faint); font-size: 12px; margin-top: 2px; }

  .filters {
    display: flex; gap: 8px; flex-wrap: wrap;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 20px;
    align-items: center;
  }
  .filters select, .filters input {
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 5px 9px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }
  .filters input { flex: 1; min-width: 180px; }
  .filters input:focus, .filters select:focus { border-color: var(--border-hover); }
  .filters label { color: var(--text-dim); font-size: 12px; display: flex; align-items: center; gap: 6px; }

  .session {
    margin-bottom: 18px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    overflow: hidden;
  }
  .session-head {
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s, background 0.15s;
  }
  .session-head:hover { background: var(--surface-2); }
  .session.open .session-head { border-bottom-color: var(--border); }
  .session-caret {
    color: var(--text-faint);
    font-size: 12px;
    transition: transform 0.15s;
  }
  .session.open .session-caret { transform: rotate(90deg); }
  .session-title { font-weight: 500; flex: 1; }
  .session-meta { color: var(--text-dim); font-size: 12px; }
  .session-active-pill {
    background: rgba(74, 222, 128, 0.15);
    color: var(--c-record);
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 500;
  }
  .session-body { display: none; }
  .session.open .session-body { display: block; }

  .event {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
    cursor: pointer;
    transition: background 0.1s;
  }
  .event:last-child { border-bottom: none; }
  .event:hover { background: var(--surface-2); }
  .event-time { color: var(--text-faint); font-variant-numeric: tabular-nums; min-width: 70px; font-size: 12px; padding-top: 2px; }
  .event-body { flex: 1; min-width: 0; }
  .event-line { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .event-pill {
    font-size: 11px;
    font-weight: 600;
    text-transform: lowercase;
    padding: 2px 8px;
    border-radius: 4px;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .event-pill.retrieve  { background: rgba(74, 158, 255, 0.15); color: var(--c-retrieve); }
  .event-pill.search    { background: rgba(136, 136, 136, 0.18); color: var(--c-search); }
  .event-pill.record    { background: rgba(74, 222, 128, 0.15); color: var(--c-record); }
  .event-pill.index     { background: rgba(192, 132, 252, 0.15); color: var(--c-index); }
  .event-pill.ingest    { background: rgba(20, 184, 166, 0.15); color: var(--c-ingest); }
  .event-pill.bootstrap { background: rgba(245, 158, 11, 0.15); color: var(--c-bootstrap); }
  .event-pill.prompt    { background: rgba(251, 191, 36, 0.15); color: var(--c-prompt); }
  .event-pill.stop      { background: rgba(107, 114, 128, 0.18); color: var(--c-stop); }
  .event-summary { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .event-duration { color: var(--text-faint); font-size: 12px; font-variant-numeric: tabular-nums; }
  .event-artifacts { margin-top: 6px; padding-left: 0; }
  .event-artifacts li {
    list-style: none;
    color: var(--text-dim);
    font-size: 13px;
    padding: 1px 0;
  }
  .event-artifacts li::before {
    content: "→ ";
    color: var(--text-faint);
  }
  .artifact-link {
    color: var(--text);
    border-bottom: 1px dotted var(--border-hover);
  }
  .artifact-link:hover { color: var(--c-retrieve); border-bottom-color: var(--c-retrieve); }
  .artifact-kind { color: var(--text-faint); font-size: 11px; margin-left: 4px; }
  .artifact-tokens {
    color: var(--text-faint);
    font-size: 11px;
    margin-left: 6px;
    font-variant-numeric: tabular-nums;
  }
  .artifact-frag-link {
    color: var(--c-retrieve);
    font-size: 11px;
    margin-left: 8px;
    padding: 1px 6px;
    border: 1px solid var(--border);
    border-radius: 4px;
    text-decoration: none;
    opacity: 0.7;
    transition: opacity 0.15s, border-color 0.15s;
  }
  .artifact-frag-link:hover {
    opacity: 1;
    border-color: var(--c-retrieve);
    text-decoration: none;
  }
  .event-details {
    display: none;
    margin-top: 8px;
    padding: 8px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    font-size: 12px;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .event.expanded .event-details { display: block; }

  .stats {
    margin-top: 32px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 13px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
  }
  .stats .label { color: var(--text-faint); }
  .stats .value { color: var(--text); font-weight: 500; }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }
  .empty h2 { font-weight: 500; font-size: 16px; margin-bottom: 8px; color: var(--text); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>CMA Memory Log <span style="color:var(--text-faint);font-weight:400;">— <span id="project-name"></span></span></h1>
    <div class="subtitle" id="subtitle"></div>
    <div class="updated" id="updated"></div>
  </header>

  <div class="filters">
    <label><input type="checkbox" id="show-low-level"> show low-level reads</label>
    <select id="filter-type">
      <option value="">all event types</option>
      <option value="prompt">prompt</option>
      <option value="retrieve">retrieve</option>
      <option value="search">search</option>
      <option value="record">record</option>
      <option value="index">index</option>
      <option value="ingest">ingest</option>
      <option value="bootstrap">bootstrap</option>
      <option value="stop">stop</option>
    </select>
    <select id="filter-session">
      <option value="">all days</option>
    </select>
    <input id="filter-query" type="text" placeholder="search queries / titles / task ids...">
  </div>

  <div id="sessions"></div>

  <div class="stats" id="stats"></div>
</div>

<script type="application/json" id="payload">{{PAYLOAD_JSON}}</script>

<script>
const LOW_LEVEL_TYPES = new Set(["get_note", "get_outgoing_links", "get_backlinks", "traverse_graph", "search_by_frontmatter", "reindex", "stop"]);
const TYPE_ORDER = ["prompt", "retrieve", "search", "record", "index", "ingest", "bootstrap", "stop"];

// Local timezone abbreviation (e.g., "PDT", "EST") — derived once at load.
const TZ_ABBREV = (() => {
  const parts = new Date().toLocaleTimeString("en-US", { timeZoneName: "short" }).split(" ");
  return parts[parts.length - 1] || "local";
})();

function localDayKey(input) {
  // YYYY-MM-DD in the viewer's local timezone. Accepts an ISO string or a Date.
  const d = typeof input === "string" ? new Date(input) : input;
  if (isNaN(d.getTime())) return "unknown";
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

function fmtTimeHM(iso) {
  const d = new Date(iso);
  if (isNaN(d.getTime())) return "";
  return `${String(d.getHours()).padStart(2, "0")}:${String(d.getMinutes()).padStart(2, "0")}`;
}

const payload = JSON.parse(document.getElementById("payload").textContent);
const events = payload.events || [];

function fmtRelative(iso) {
  const t = Date.parse(iso); const now = Date.now();
  const sec = Math.round((now - t) / 1000);
  if (sec < 5) return "just now";
  if (sec < 60) return sec + "s ago";
  const min = Math.round(sec / 60);
  if (min < 60) return min + "m ago";
  const hr = Math.round(min / 60);
  if (hr < 24) return hr + "h ago";
  const day = Math.round(hr / 24);
  return day + "d ago";
}

function fmtTimeOnly(iso) {
  const d = new Date(iso);
  return d.toTimeString().slice(0, 8);
}

function fmtDayTitle(dayKey) {
  // dayKey is "YYYY-MM-DD" in local time. Show "Today" / "Yesterday" / long form so the
  // most-relevant rows read naturally at a glance.
  const today = new Date();
  const todayKey = localDayKey(today);
  const yest = new Date(today); yest.setDate(today.getDate() - 1);
  const yestKey = localDayKey(yest);
  if (dayKey === todayKey) return `Today · ${dayKey}`;
  if (dayKey === yestKey) return `Yesterday · ${dayKey}`;
  // Add weekday for context on older days. Use noon-local to avoid TZ rollover.
  const d = new Date(dayKey + "T12:00:00");
  const wd = d.toLocaleDateString(undefined, { weekday: "short" });
  return `${wd} · ${dayKey}`;
}

function escapeHtml(s) {
  if (s === null || s === undefined) return "";
  return String(s).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}

function artifactLink(artifact) {
  // artifact: {title, path, kind, tokens_extracted?, tokens_total?, percent?, fragments?, spec_path?}
  // Two links per source artifact when a spec_path is present:
  //   1. The artifact title -> opens the SOURCE note in Obsidian (full context)
  //   2. "view fragments" -> opens the SPEC.md in Obsidian, where the extracted
  //      paragraphs for this source appear under a `### From [[title]]` heading.
  const absSource = (payload.vault_path + "/" + artifact.path).replace(/\\/g, "/");
  const sourceUrl = `obsidian://open?path=${encodeURIComponent(absSource)}`;
  const kind = artifact.kind ? `<span class="artifact-kind">(${escapeHtml(artifact.kind)})</span>` : "";

  let tokens = "";
  if (typeof artifact.tokens_extracted === "number") {
    const pct = typeof artifact.percent === "number" ? artifact.percent : 0;
    const frags = artifact.fragments ? `, ${artifact.fragments} frag${artifact.fragments === 1 ? "" : "s"}` : "";
    tokens = `<span class="artifact-tokens">· ${artifact.tokens_extracted}/${artifact.tokens_total} tokens (${pct}%${frags})</span>`;
  }

  let fragLink = "";
  if (artifact.spec_path) {
    const absSpec = (payload.vault_path + "/" + artifact.spec_path).replace(/\\/g, "/");
    const specUrl = `obsidian://open?path=${encodeURIComponent(absSpec)}`;
    fragLink = ` <a class="artifact-frag-link" href="${escapeHtml(specUrl)}" title="open the spec.md and jump to this source's fragments">view fragments</a>`;
  }

  return `<a class="artifact-link" href="${escapeHtml(sourceUrl)}" title="${escapeHtml(absSource)}">${escapeHtml(artifact.title)}</a>${kind}${tokens}${fragLink}`;
}

function renderEvent(ev) {
  const time = fmtTimeOnly(ev.ts);
  const pill = `<span class="event-pill ${ev.type}">${escapeHtml(ev.type)}</span>`;
  const summary = escapeHtml(ev.summary || ev.query || ev.task_id || "");
  const dur = ev.duration_ms ? `<span class="event-duration">${(ev.duration_ms / 1000).toFixed(2)}s</span>` : "";
  let artifactsHtml = "";
  if (ev.artifacts && ev.artifacts.length) {
    const items = ev.artifacts.map(a => `<li>${artifactLink(a)}</li>`).join("");
    artifactsHtml = `<ul class="event-artifacts">${items}</ul>`;
  }
  const detailsBlock = (ev.details || ev.query) ?
    `<div class="event-details">${escapeHtml(JSON.stringify(ev.details || {query: ev.query, task_id: ev.task_id}, null, 2))}</div>` : "";
  return `
    <div class="event" data-type="${escapeHtml(ev.type)}" data-text="${escapeHtml((ev.query || "") + " " + (ev.task_id || "") + " " + (ev.summary || "")).toLowerCase()}">
      <div class="event-time">${escapeHtml(time)}</div>
      <div class="event-body">
        <div class="event-line">${pill}<div class="event-summary">${summary}</div>${dur}</div>
        ${artifactsHtml}
        ${detailsBlock}
      </div>
    </div>`;
}

function groupByDay(events) {
  // Group by calendar date in the viewer's local timezone. Process-level session_ids
  // are kept in the JSONL for forensics but are noise in the dashboard: every CLI
  // invocation is its own process, so they fragment a single day of work into many
  // tiny "sessions". A day is the unit a human actually cares about.
  const groups = new Map();
  for (const ev of events) {
    const day = ev.ts ? localDayKey(ev.ts) : "unknown";
    if (!groups.has(day)) groups.set(day, []);
    groups.get(day).push(ev);
  }
  // Newest events first within each day, so the most recent prompt sits at the top
  // of its group (matches how humans read a live log).
  for (const evs of groups.values()) {
    evs.sort((a, b) => (b.ts || "").localeCompare(a.ts || ""));
  }
  // Newest day first.
  return [...groups.entries()].sort((a, b) => b[0].localeCompare(a[0]));
}

function render() {
  document.getElementById("project-name").textContent = payload.project_name;
  const total = events.length;
  const days = groupByDay(events);
  const lastTs = events.length ? events[events.length - 1].ts : null;
  const subtitle = `${total} event${total === 1 ? "" : "s"} · ${days.length} day${days.length === 1 ? "" : "s"}` +
    (lastTs ? ` · last activity ${fmtRelative(lastTs)}` : "");
  document.getElementById("subtitle").textContent = subtitle;
  document.getElementById("updated").textContent = `Generated ${fmtRelative(payload.generated_at)} · auto-refreshes every 5 seconds`;

  // populate day filter
  const sel = document.getElementById("filter-session");
  sel.length = 1;
  for (const [day] of days) {
    const opt = document.createElement("option");
    opt.value = day;
    opt.textContent = fmtDayTitle(day);
    sel.appendChild(opt);
  }

  const showLowLevel = document.getElementById("show-low-level").checked;
  const filterType = document.getElementById("filter-type").value;
  const filterDay = document.getElementById("filter-session").value;
  const filterQuery = document.getElementById("filter-query").value.trim().toLowerCase();

  const container = document.getElementById("sessions");
  if (events.length === 0) {
    container.innerHTML = `<div class="empty"><h2>No events yet</h2>The memory log fills in as the agent searches, retrieves, and records. Run "add cma" then ask the agent to retrieve something.</div>`;
    document.getElementById("stats").innerHTML = "";
    return;
  }

  let html = "";
  const mostRecentDay = days.length ? days[0][0] : null;
  for (const [day, evs] of days) {
    if (filterDay && day !== filterDay) continue;
    const visible = evs.filter(ev => {
      if (!showLowLevel && LOW_LEVEL_TYPES.has(ev.type)) return false;
      if (filterType && ev.type !== filterType) return false;
      if (filterQuery) {
        const text = ((ev.query || "") + " " + (ev.task_id || "") + " " + (ev.summary || "")).toLowerCase();
        if (!text.includes(filterQuery)) return false;
      }
      return true;
    });
    if (visible.length === 0) continue;
    const isActive = day === mostRecentDay;
    // evs is sorted newest-first inside groupByDay, so evs[0] is the most recent.
    const newestTime = fmtTimeHM(evs[0].ts);
    const oldestTime = fmtTimeHM(evs[evs.length - 1].ts);
    const span = newestTime === oldestTime ? newestTime : `${oldestTime}–${newestTime}`;
    const openClass = sessionStorage.getItem("day-" + day) === "closed" ? "" : "open";
    const activePill = isActive ? `<span class="session-active-pill">active</span>` : "";
    html += `
      <div class="session ${openClass}" data-sid="${escapeHtml(day)}">
        <div class="session-head" onclick="toggleSession('${escapeHtml(day)}')">
          <span class="session-caret">▶</span>
          <div class="session-title">${escapeHtml(fmtDayTitle(day))}</div>
          <span class="session-meta">${visible.length} event${visible.length === 1 ? "" : "s"} · ${span} ${TZ_ABBREV}</span>
          ${activePill}
        </div>
        <div class="session-body">
          ${visible.map(renderEvent).join("")}
        </div>
      </div>`;
  }
  container.innerHTML = html || `<div class="empty">No events match the current filters.</div>`;

  // attach click handlers for expanding events
  container.querySelectorAll(".event").forEach(el => {
    el.addEventListener("click", () => el.classList.toggle("expanded"));
  });

  // stats
  const counts = {};
  for (const ev of events) counts[ev.type] = (counts[ev.type] || 0) + 1;
  const statsHtml = TYPE_ORDER.filter(t => counts[t]).map(t =>
    `<span><span class="label">${t}:</span> <span class="value">${counts[t]}</span></span>`
  ).join("");
  document.getElementById("stats").innerHTML = statsHtml;
}

function toggleSession(day) {
  // Name kept for the inline onclick handlers; semantics are now per-day.
  const el = document.querySelector(`.session[data-sid="${day}"]`);
  if (!el) return;
  el.classList.toggle("open");
  sessionStorage.setItem("day-" + day, el.classList.contains("open") ? "open" : "closed");
}

// Restore scroll on load, save on unload
window.addEventListener("DOMContentLoaded", () => {
  render();
  document.getElementById("show-low-level").addEventListener("change", render);
  document.getElementById("filter-type").addEventListener("change", render);
  document.getElementById("filter-session").addEventListener("change", render);
  document.getElementById("filter-query").addEventListener("input", render);
  // restore filters
  const savedQ = sessionStorage.getItem("filter-query");
  if (savedQ) { document.getElementById("filter-query").value = savedQ; render(); }
  // restore scroll
  const y = parseInt(sessionStorage.getItem("scroll-y") || "0", 10);
  if (y > 0) window.scrollTo(0, y);
});
window.addEventListener("beforeunload", () => {
  sessionStorage.setItem("scroll-y", String(window.scrollY));
  sessionStorage.setItem("filter-query", document.getElementById("filter-query").value);
});
</script>
</body>
</html>
